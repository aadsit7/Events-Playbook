<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Event Command Center</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: rgba(255,255,255,.82);
    --surface-solid: #ffffff;
    --surface-2: #f2f2f7;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --faint: #8e8e93;
    --line: rgba(0,0,0,.08);
    --line-strong: rgba(0,0,0,.14);
    --blue: #0071e3;
    --blue-soft: #e8f2ff;
    --green: #22a06b;
    --green-soft: #e7f7ef;
    --amber: #c87900;
    --amber-soft: #fff3db;
    --red: #d92d20;
    --red-soft: #ffebe9;
    --purple: #7c3aed;
    --purple-soft: #f1eaff;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04), 0 7px 24px rgba(0,0,0,.05);
    --shadow-md: 0 18px 50px rgba(0,0,0,.10);
    --radius-sm: 14px;
    --radius: 22px;
    --radius-lg: 30px;
  }

  html[data-theme="dark"] {
    --bg: #000000;
    --surface: rgba(28,28,30,.82);
    --surface-solid: #1c1c1e;
    --surface-2: #2c2c2e;
    --text: #f5f5f7;
    --muted: #a1a1a6;
    --faint: #8e8e93;
    --line: rgba(255,255,255,.10);
    --line-strong: rgba(255,255,255,.18);
    --blue: #2997ff;
    --blue-soft: rgba(41,151,255,.16);
    --green: #46c989;
    --green-soft: rgba(70,201,137,.14);
    --amber: #ffb340;
    --amber-soft: rgba(255,179,64,.14);
    --red: #ff6961;
    --red-soft: rgba(255,105,97,.14);
    --purple: #a78bfa;
    --purple-soft: rgba(167,139,250,.14);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.35), 0 10px 28px rgba(0,0,0,.28);
    --shadow-md: 0 24px 70px rgba(0,0,0,.45);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 82% 0%, rgba(0,113,227,.08), transparent 28%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }

  button, input, select, textarea { font: inherit; color: inherit; }
  button { cursor: pointer; }
  a { color: inherit; }
  .hidden { display: none !important; }

  .app-shell { min-height: 100vh; display: grid; grid-template-columns: 238px minmax(0,1fr); }
  .sidebar {
    height: 100vh;
    position: sticky;
    top: 0;
    z-index: 30;
    display: flex;
    flex-direction: column;
    padding: 20px 14px 16px;
    border-right: 1px solid var(--line);
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: saturate(180%) blur(28px);
  }
  .brand { display: flex; align-items: center; gap: 11px; padding: 6px 10px 20px; }
  .brand-mark {
    width: 34px; height: 34px; display: grid; place-items: center; border-radius: 10px;
    background: linear-gradient(145deg, #1677ff, #0055b8); color: white; box-shadow: 0 8px 24px rgba(0,113,227,.28);
  }
  .brand-copy strong { display: block; font-size: 14px; letter-spacing: -.015em; }
  .brand-copy span { color: var(--muted); font-size: 11px; }
  .nav-label { padding: 13px 12px 6px; color: var(--faint); font-size: 10px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; }
  .nav-item {
    width: 100%; display: flex; align-items: center; gap: 11px; border: 0; background: transparent;
    padding: 10px 11px; margin: 2px 0; border-radius: 11px; color: var(--muted); text-align: left; transition: .18s ease;
  }
  .nav-item svg { flex: 0 0 auto; }
  .nav-item:hover { color: var(--text); background: var(--surface-2); }
  .nav-item.active { color: var(--text); background: var(--surface-solid); box-shadow: var(--shadow-sm); }
  .nav-item.active svg { color: var(--blue); }
  .nav-count { margin-left: auto; min-width: 20px; padding: 2px 6px; border-radius: 999px; background: var(--surface-2); color: var(--muted); font-size: 11px; text-align: center; }
  .sidebar-spacer { flex: 1; }
  .mini-card { margin: 12px 4px; padding: 14px; border: 1px solid var(--line); background: var(--surface); border-radius: 16px; }
  .mini-card .eyebrow { margin-bottom: 7px; }
  .mini-card strong { display: block; font-size: 22px; letter-spacing: -.04em; }
  .mini-card p { margin: 4px 0 10px; color: var(--muted); font-size: 12px; }
  .mini-progress { height: 5px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
  .mini-progress span { display: block; height: 100%; background: var(--blue); border-radius: inherit; }
  .sidebar-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 6px 4px 0; }

  .workspace { min-width: 0; }
  .topbar {
    height: 72px; position: sticky; top: 0; z-index: 25; display: flex; align-items: center; gap: 12px;
    padding: 0 28px; border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--bg) 76%, transparent);
    backdrop-filter: saturate(180%) blur(28px);
  }
  .page-name { min-width: 160px; font-size: 14px; font-weight: 650; letter-spacing: -.01em; }
  .search-wrap { position: relative; width: min(390px, 40vw); margin-left: auto; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--faint); pointer-events: none; }
  .search-input {
    width: 100%; height: 38px; border: 1px solid transparent; outline: none; border-radius: 11px;
    padding: 0 36px 0 38px; background: var(--surface-2); transition: .18s ease;
  }
  .search-input:focus { background: var(--surface-solid); border-color: color-mix(in srgb, var(--blue) 45%, transparent); box-shadow: 0 0 0 4px color-mix(in srgb, var(--blue) 12%, transparent); }
  .search-clear { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; border: 0; border-radius: 50%; background: var(--faint); color: var(--surface-solid); display: grid; place-items: center; }
  .icon-btn, .soft-btn, .primary-btn, .secondary-btn, .danger-btn {
    border: 0; border-radius: 11px; transition: transform .12s ease, background .18s ease, box-shadow .18s ease;
  }
  .icon-btn:active, .soft-btn:active, .primary-btn:active, .secondary-btn:active { transform: scale(.97); }
  .icon-btn { width: 38px; height: 38px; display: grid; place-items: center; background: var(--surface-2); }
  .icon-btn:hover { background: color-mix(in srgb, var(--surface-2) 70%, var(--text) 7%); }
  .soft-btn { min-height: 34px; padding: 8px 12px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; background: var(--surface-2); font-weight: 600; font-size: 13px; }
  .soft-btn:hover { background: color-mix(in srgb, var(--surface-2) 70%, var(--text) 7%); }
  .primary-btn { min-height: 38px; padding: 9px 15px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--blue); color: white; font-weight: 650; box-shadow: 0 8px 20px rgba(0,113,227,.20); }
  .primary-btn:hover { filter: brightness(1.04); }
  .secondary-btn { min-height: 38px; padding: 9px 15px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--surface-solid); border: 1px solid var(--line); font-weight: 650; }
  .danger-btn { min-height: 36px; padding: 8px 13px; background: var(--red-soft); color: var(--red); font-weight: 650; }
  .tiny-btn { border: 0; background: transparent; padding: 4px; border-radius: 7px; color: var(--muted); }
  .tiny-btn:hover { background: var(--surface-2); color: var(--text); }

  main { max-width: 1500px; margin: 0 auto; padding: 34px 34px 70px; }
  .page-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 26px; }
  .page-title { margin: 0; font-size: clamp(30px, 4vw, 44px); line-height: 1.03; letter-spacing: -.055em; font-weight: 720; }
  .page-subtitle { max-width: 650px; margin: 9px 0 0; color: var(--muted); font-size: 16px; letter-spacing: -.01em; }
  .eyebrow { color: var(--muted); font-size: 11px; font-weight: 750; letter-spacing: .08em; text-transform: uppercase; }
  .page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .hero {
    position: relative; overflow: hidden; display: grid; grid-template-columns: minmax(0,1.5fr) minmax(280px,.7fr); gap: 26px;
    padding: clamp(24px, 4vw, 42px); border: 1px solid var(--line); border-radius: var(--radius-lg); background:
      radial-gradient(circle at 95% 10%, rgba(41,151,255,.22), transparent 28%),
      linear-gradient(145deg, color-mix(in srgb, var(--surface-solid) 92%, #dcecff 8%), var(--surface-solid)); box-shadow: var(--shadow-sm);
  }
  .hero h2 { margin: 12px 0 10px; font-size: clamp(30px, 4vw, 52px); line-height: 1.02; letter-spacing: -.06em; }
  .hero p { max-width: 620px; margin: 0 0 24px; color: var(--muted); font-size: 16px; }
  .hero-actions { display: flex; gap: 9px; flex-wrap: wrap; }
  .hero-orbit { display: grid; place-items: center; min-height: 240px; }
  .ring-wrap { position: relative; width: 198px; height: 198px; }
  .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--surface-2); stroke-width: 12; }
  .ring-value { fill: none; stroke: url(#ringGradient); stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset .4s ease; }
  .ring-copy { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; }
  .ring-copy strong { display: block; font-size: 45px; line-height: 1; letter-spacing: -.06em; }
  .ring-copy span { color: var(--muted); font-size: 12px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 14px; margin: 18px 0 30px; }
  .kpi-card { padding: 19px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow-sm); backdrop-filter: blur(18px); }
  .kpi-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .kpi-icon { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 11px; background: var(--blue-soft); color: var(--blue); }
  .kpi-card strong { display: block; margin-top: 18px; font-size: 28px; line-height: 1; letter-spacing: -.045em; }
  .kpi-card p { margin: 7px 0 0; color: var(--muted); font-size: 12px; }
  .delta { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; }
  .delta.up { color: var(--green); }
  .delta.warn { color: var(--amber); }

  .section-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin: 28px 0 13px; }
  .section-row h3 { margin: 0; font-size: 20px; letter-spacing: -.025em; }
  .section-row p { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
  .text-link { border: 0; background: transparent; color: var(--blue); font-weight: 650; padding: 5px 0; }

  .event-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 15px; }
  .event-card {
    position: relative; min-height: 252px; overflow: hidden; padding: 20px; border: 1px solid var(--line); border-radius: var(--radius);
    background: var(--surface-solid); box-shadow: var(--shadow-sm); transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .event-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--line-strong); }
  .event-card::after { content: ""; position: absolute; width: 110px; height: 110px; border-radius: 50%; right: -46px; top: -44px; background: var(--accent-soft, var(--blue-soft)); filter: blur(2px); }
  .event-card-top { position: relative; z-index: 1; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .event-symbol { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 14px; background: var(--accent-soft, var(--blue-soft)); color: var(--accent, var(--blue)); }
  .status-pill, .type-pill, .owner-pill, .priority-pill { display: inline-flex; align-items: center; gap: 5px; border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .status-pill { padding: 5px 8px; background: var(--surface-2); color: var(--muted); }
  .status-pill.on-track { background: var(--green-soft); color: var(--green); }
  .status-pill.at-risk { background: var(--amber-soft); color: var(--amber); }
  .status-pill.blocked { background: var(--red-soft); color: var(--red); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .event-card h4 { position: relative; z-index: 1; margin: 26px 0 5px; font-size: 20px; line-height: 1.15; letter-spacing: -.035em; }
  .event-meta { position: relative; z-index: 1; display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; }
  .event-progress { position: relative; z-index: 1; margin-top: 24px; }
  .progress-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; font-size: 11px; color: var(--muted); }
  .progress-label strong { color: var(--text); }
  .progress-track { height: 7px; border-radius: 99px; background: var(--surface-2); overflow: hidden; }
  .progress-fill { display: block; height: 100%; border-radius: inherit; background: var(--accent, var(--blue)); transition: width .35s ease; }
  .event-card-foot { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line); }
  .event-card-foot span { color: var(--muted); font-size: 11px; }
  .avatar { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 50%; background: linear-gradient(145deg, var(--surface-2), color-mix(in srgb,var(--blue) 12%,var(--surface-solid))); border: 1px solid var(--line); font-size: 10px; font-weight: 750; }

  .dashboard-grid { display: grid; grid-template-columns: minmax(0,1.25fr) minmax(330px,.75fr); gap: 16px; }
  .panel { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow-sm); overflow: hidden; backdrop-filter: blur(18px); }
  .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 15px; padding: 18px 19px 13px; }
  .panel-head h3 { margin: 0; font-size: 16px; letter-spacing: -.02em; }
  .panel-head p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }
  .task-list { padding: 0 9px 10px; }
  .task-row { display: grid; grid-template-columns: auto minmax(0,1fr) auto; gap: 11px; align-items: start; padding: 12px 10px; border-radius: 13px; }
  .task-row:hover { background: var(--surface-2); }
  .check {
    appearance: none; width: 19px; height: 19px; margin: 2px 0 0; display: grid; place-items: center; border-radius: 6px;
    border: 1.5px solid var(--line-strong); background: var(--surface-solid); transition: .15s ease;
  }
  .check:checked { background: var(--blue); border-color: var(--blue); }
  .check:checked::after { content: ""; width: 8px; height: 4px; border-left: 2px solid white; border-bottom: 2px solid white; transform: translateY(-1px) rotate(-45deg); }
  .task-copy strong { display: block; font-size: 13px; font-weight: 650; }
  .task-copy span { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; }
  .due { color: var(--muted); font-size: 11px; white-space: nowrap; padding-top: 3px; }
  .due.overdue { color: var(--red); font-weight: 700; }
  .empty-state { padding: 36px 20px; text-align: center; color: var(--muted); }
  .empty-state .empty-icon { width: 52px; height: 52px; margin: 0 auto 12px; display: grid; place-items: center; border-radius: 17px; background: var(--surface-2); color: var(--faint); }

  .activity-list { padding: 3px 18px 18px; }
  .activity { display: grid; grid-template-columns: auto minmax(0,1fr); gap: 11px; padding: 11px 0; border-top: 1px solid var(--line); }
  .activity:first-child { border-top: 0; }
  .activity-icon { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 10px; background: var(--surface-2); color: var(--muted); }
  .activity strong { display: block; font-size: 12px; }
  .activity span { color: var(--muted); font-size: 11px; }

  .filter-bar { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-bottom: 16px; }
  .segmented { display: inline-flex; padding: 3px; border-radius: 11px; background: var(--surface-2); }
  .segment { border: 0; background: transparent; padding: 7px 11px; border-radius: 8px; color: var(--muted); font-size: 12px; font-weight: 650; }
  .segment.active { background: var(--surface-solid); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .select-control, .input-control, .textarea-control {
    border: 1px solid var(--line); background: var(--surface-solid); border-radius: 11px; outline: none;
  }
  .select-control, .input-control { min-height: 38px; padding: 0 11px; }
  .textarea-control { width: 100%; min-height: 100px; padding: 11px; resize: vertical; }
  .select-control:focus, .input-control:focus, .textarea-control:focus { border-color: color-mix(in srgb,var(--blue) 45%,transparent); box-shadow: 0 0 0 4px color-mix(in srgb,var(--blue) 12%,transparent); }

  .event-hero { padding: 26px; border: 1px solid var(--line); border-radius: var(--radius-lg); background: var(--surface-solid); box-shadow: var(--shadow-sm); }
  .event-breadcrumb { display: inline-flex; align-items: center; gap: 5px; border: 0; background: transparent; color: var(--blue); font-weight: 650; padding: 0 0 17px; }
  .event-head-grid { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 24px; align-items: center; }
  .event-title-row { display: flex; align-items: center; gap: 13px; }
  .event-title-row .event-symbol { width: 50px; height: 50px; }
  .event-title { margin: 0; font-size: clamp(28px,4vw,42px); line-height: 1.02; letter-spacing: -.052em; }
  .event-subline { display: flex; flex-wrap: wrap; gap: 8px 15px; margin: 12px 0 0; color: var(--muted); font-size: 13px; }
  .event-subline span { display: inline-flex; align-items: center; gap: 6px; }
  .event-head-actions { display: flex; gap: 8px; margin-top: 20px; }
  .compact-ring { position: relative; width: 116px; height: 116px; }
  .compact-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .compact-ring .ring-track, .compact-ring .ring-value { stroke-width: 10; }
  .compact-ring .ring-copy strong { font-size: 27px; }
  .compact-ring .ring-copy span { font-size: 10px; }
  .detail-tabs { display: flex; gap: 3px; margin: 18px 0; padding: 4px; border-radius: 14px; background: var(--surface-2); width: fit-content; max-width: 100%; overflow-x: auto; }
  .detail-tab { border: 0; background: transparent; padding: 9px 14px; border-radius: 10px; color: var(--muted); font-size: 13px; font-weight: 650; white-space: nowrap; }
  .detail-tab.active { color: var(--text); background: var(--surface-solid); box-shadow: 0 2px 8px rgba(0,0,0,.08); }

  .detail-grid { display: grid; grid-template-columns: minmax(0,1.2fr) minmax(300px,.7fr); gap: 16px; }
  .score-list { padding: 3px 18px 17px; }
  .score-row { padding: 11px 0; border-top: 1px solid var(--line); }
  .score-row:first-child { border-top: 0; }
  .score-top { display: flex; justify-content: space-between; gap: 12px; font-size: 12px; }
  .score-top span { color: var(--muted); }
  .score-track { height: 6px; margin-top: 8px; border-radius: 99px; background: var(--surface-2); overflow: hidden; }
  .score-track span { display: block; height: 100%; border-radius: inherit; background: var(--blue); }
  .action-list { padding: 0 10px 11px; }
  .action-card { display: grid; grid-template-columns: 35px minmax(0,1fr) auto; gap: 11px; align-items: center; padding: 11px; border-radius: 14px; }
  .action-card:hover { background: var(--surface-2); }
  .action-number { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 10px; background: var(--blue-soft); color: var(--blue); font-size: 12px; font-weight: 750; }
  .action-card strong { display: block; font-size: 13px; }
  .action-card span { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }

  .phase-rail { display: grid; grid-template-columns: repeat(5,minmax(110px,1fr)); gap: 7px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 3px; }
  .phase-card { min-width: 115px; padding: 13px; border: 1px solid var(--line); border-radius: 15px; background: var(--surface-solid); text-align: left; }
  .phase-card.active { border-color: color-mix(in srgb,var(--blue) 42%,var(--line)); box-shadow: 0 0 0 3px color-mix(in srgb,var(--blue) 10%,transparent); }
  .phase-card.complete .phase-index { background: var(--green-soft); color: var(--green); }
  .phase-index { width: 24px; height: 24px; display: grid; place-items: center; border-radius: 8px; background: var(--surface-2); color: var(--muted); font-size: 10px; font-weight: 800; }
  .phase-card strong { display: block; margin-top: 11px; font-size: 12px; }
  .phase-card span { display: block; margin-top: 3px; color: var(--muted); font-size: 10px; }
  .checklist-panel { overflow: visible; }
  .checklist-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 18px; border-bottom: 1px solid var(--line); }
  .checklist-head h3 { margin: 0; font-size: 17px; }
  .checklist-head p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }
  .checklist-controls { display: flex; gap: 7px; flex-wrap: wrap; }
  .plan-task-list { padding: 7px; }
  .plan-task { display: grid; grid-template-columns: auto minmax(0,1fr) auto; gap: 12px; align-items: start; padding: 13px 11px; border-radius: 14px; }
  .plan-task:hover { background: var(--surface-2); }
  .plan-task.done .task-copy strong { text-decoration: line-through; color: var(--faint); }
  .plan-task-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .owner-pill { padding: 3px 7px; background: var(--surface-2); color: var(--muted); }

  const initialState = {
    view:'home', selectedEventId:null, eventTab:'overview', planPhase:'Build demand', search:'', eventFilter:'All', taskFilter:'remaining', ownerFilter:'All', templateFilter:'All', theme:'system',
    events:seedEvents
  };

  let state = loadState();

  function loadState() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!saved || !Array.isArray(saved.events)) return structuredClone(initialState);
      return {...structuredClone(initialState), ...saved};
    } catch { return structuredClone(initialState); }
  }
  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
    updateChrome();
  }
  function money(n) {
    if (!Number.isFinite(Number(n))) return '$0';
    const x = Number(n);
    if (Math.abs(x) >= 1000000) return '$' + (x/1000000).toFixed(x%1000000===0?0:1) + 'M';
    if (Math.abs(x) >= 1000) return '$' + Math.round(x/1000) + 'K';
    return '$' + Math.round(x).toLocaleString();
  }
  function number(n) { return Number(n || 0).toLocaleString(); }
  function initials(name) { return name.split(/\s+/).map(x => x[0]).slice(0,2).join('').toUpperCase(); }
  function dateLabel(date) { return new Intl.DateTimeFormat('en-US',{month:'short',day:'numeric',year:'numeric'}).format(new Date(date+'T12:00:00')); }
  function daysTo(date) { return Math.ceil((new Date(date+'T12:00:00') - new Date('2026-07-16T12:00:00'))/86400000); }
  function eventIcon(type) { return type.includes('Webinar') ? 'webinar' : type.includes('Partner') ? 'handshake' : type.includes('User') ? 'group' : type.includes('conference') ? 'conference' : 'users'; }
  function accentVars(accent) {
    const map = {
      blue:['var(--blue)','var(--blue-soft)'], purple:['var(--purple)','var(--purple-soft)'], green:['var(--green)','var(--green-soft)'], amber:['var(--amber)','var(--amber-soft)'], red:['var(--red)','var(--red-soft)']
    };
    const v = map[accent] || map.blue;
    return `--accent:${v[0]};--accent-soft:${v[1]}`;
  }
  function completion(event) {
    if (!event.tasks.length) return 0;
    return Math.round(event.tasks.filter(t => t.done).length / event.tasks.length * 100);
  }
  function overallReadiness() {
    const all = state.events.flatMap(e => e.tasks);
    return all.length ? Math.round(all.filter(t => t.done).length/all.length*100) : 0;
  }
  function statusLabel(status) { return status === 'on-track' ? 'On track' : status === 'at-risk' ? 'At risk' : 'Blocked'; }
  function effectiveTheme() {
    if (state.theme === 'system') return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    return state.theme;
  }
  function applyTheme() { document.documentElement.dataset.theme = effectiveTheme(); }
  function ring(percent, compact=false) {
    const r = compact ? 47 : 82;
    const c = 2*Math.PI*r;
    return `<div class="${compact?'compact-ring':'ring-wrap'}">
      <svg viewBox="0 0 ${compact?116:198} ${compact?116:198}">
        <defs><linearGradient id="ringGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#00a2ff"/><stop offset="1" stop-color="#0066d6"/></linearGradient></defs>
        <circle class="ring-track" cx="${compact?58:99}" cy="${compact?58:99}" r="${r}"/>
        <circle class="ring-value" cx="${compact?58:99}" cy="${compact?58:99}" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-percent/100)}"/>
      </svg><div class="ring-copy"><div><strong>${percent}%</strong><span>ready</span></div></div></div>`;
  }

  function renderNav() {

  }
  function updateChrome() {
    applyTheme();
    renderNav();
    const names = {home:'Command Center',events:'Events',calculators:'Calculators',templates:'Templates',performance:'Performance'};
    document.getElementById('pageName').textContent = state.selectedEventId ? 'Event workspace' : names[state.view];

    document.getElementById('searchClear').classList.toggle('hidden', !state.search);

    updateChrome();

    if (state.selectedEventId) app.innerHTML = renderEventDetail();

    else if (state.view === 'events') app.innerHTML = renderEvents();

  function pageHeader(eyebrow,title,subtitle,actions='') {

  }

  function filteredEvents() {
    const q = state.search.trim().toLowerCase();
    return state.events.filter(e => {
      const filterOk = state.eventFilter === 'All' || e.type === state.eventFilter || (state.eventFilter==='Needs attention' && e.status!=='on-track');
      const qOk = !q || [e.name,e.type,e.location,e.owner,e.phase,...e.tasks.map(t=>t.title)].join(' ').toLowerCase().includes(q);
      return filterOk && qOk;
    });
  }

  function portfolioSignals() {
    const risk = state.events.find(e=>e.status==='at-risk');
    const top = [...state.events].sort((a,b)=>b.metrics.pipeline-a.metrics.pipeline)[0];
    const urgent = state.events.flatMap(e=>e.tasks.filter(t=>!t.done&&t.priority==='critical').map(t=>({e,t}))).sort((a,b)=>a.t.due.localeCompare(b.t.due))[0];
    const arr = [];
    if (risk) arr.push(['alert',`${risk.name} is at risk`,`${risk.tasks.filter(t=>!t.done&&t.priority==='critical').length} critical items remain.`]);
    if (urgent) arr.push(['clock',urgent.t.title,`${urgent.e.name} · due ${dateLabel(urgent.t.due)}`]);
    if (top) arr.push(['trend',`${top.name} leads pipeline`,`${money(top.metrics.pipeline)} created against ${money(top.pipelineTarget)} target.`]);
    arr.push(['spark','Fast follow-up wins','Complete personal outreach within 24 hours for the highest-intent leads.']);

  function renderPerformance() {
    const pipeline = state.events.reduce((s,e)=>s+e.metrics.pipeline,0);
    const budget = state.events.reduce((s,e)=>s+e.budget,0);
    const opps = state.events.reduce((s,e)=>s+e.metrics.opportunities,0);

    const roi = budget?Math.round((expected-budget)/budget*100):0;
    const maxPipeline = Math.max(...state.events.map(e=>e.metrics.pipeline),1);
    const totals = ['registrations','attendees','leads','sql','opportunities'].map(k=>[k,state.events.reduce((s,e)=>s+Number(e.metrics[k]||0),0)]);
    const maxFunnel = Math.max(...totals.map(x=>x[1]),1);
    return `${pageHeader('Portfolio intelligence','Performance','See which event motions create pipeline and where conversion breaks.',`<button class="secondary-btn" data-action="export-data">${icon('download',15)} Export data</button>`)}
      <section class="kpi-grid">${kpiCard('dollar','Pipeline',money(pipeline),'Across all events')}${kpiCard('trend','Modeled ROI',`${roi}%`,'At 25% win rate',roi>=0?'up':'warn')}${kpiCard('target','Opportunities',number(opps),'Created')}${kpiCard('pie','Total investment',money(budget),'Approved budgets','warn')}</section>
      <section class="performance-grid"><div class="panel"><div class="panel-head"><div><h3>Pipeline by event</h3><p>Created pipeline versus target</p></div></div><div class="bar-chart">${[...state.events].sort((a,b)=>b.metrics.pipeline-a.metrics.pipeline).map(e=>`<div class="bar-row"><div class="bar-label"><strong>${e.name}</strong><span>${Math.round(e.metrics.pipeline/Math.max(e.pipelineTarget,1)*100)}% of target</span></div><div class="bar-track"><div class="bar-value" style="width:${Math.max(2,e.metrics.pipeline/maxPipeline*100)}%"></div></div><div class="bar-number">${money(e.metrics.pipeline)}</div></div>`).join('')}</div></div>
      <div class="panel"><div class="panel-head"><div><h3>Portfolio funnel</h3><p>Aggregate conversion</p></div></div><div class="funnel">${totals.map(([label,value])=>`<div class="funnel-row"><span class="funnel-label">${label==='sql'?'SQLs':label[0].toUpperCase()+label.slice(1)}</span><div class="funnel-bar"><span style="width:${Math.max(2,value/maxFunnel*100)}%"></span></div><strong class="funnel-value">${number(value)}</strong></div>`).join('')}</div></div></section>
      <div class="section-row"><div><h3>Performance signals</h3><p>Portfolio-level decisions.</p></div></div>
      <section class="panel"><div class="insight-list">${performanceInsights()}</div></section>`;

  function performanceInsights() {
    const sorted = [...state.events].sort((a,b)=>(b.metrics.pipeline/Math.max(b.budget,1))-(a.metrics.pipeline/Math.max(a.budget,1)));
    const best = sorted[0];
    const risk = state.events.find(e=>e.status==='at-risk');
    return [
      ['trend',`${best.name} has the strongest pipeline efficiency`,`${money(best.metrics.pipeline/best.budget)} in pipeline per dollar invested.`],
      ['target','Meeting creation is the leading indicator',`${state.events.reduce((s,e)=>s+e.metrics.meetings,0)} meetings are currently tied to ${state.events.reduce((s,e)=>s+e.metrics.opportunities,0)} opportunities.`],
      risk ? ['alert',`${risk.name} needs intervention`,`${risk.tasks.filter(t=>!t.done&&t.priority==='critical').length} critical items are still open.`] : ['check','No events are at risk','The portfolio is operating within current readiness thresholds.'],
      ['spark','Use the 24-hour standard','Personal follow-up should start before broad nurture for high-intent conversations.']
    ].map(([ico,title,detail])=>`<div class="insight"><div class="insight-icon">${icon(ico,16)}</div><div><strong>${title}</strong><span>${detail}</span></div></div>`).join('');
  }

  function emptyState(ico,title,detail) { return `<div class="empty-state"><div class="empty-icon">${icon(ico,22)}</div><strong>${title}</strong><div>${detail}</div></div>`; }

  function bindLocalInputs() {

  function updateCalculators() {
    const get = id => Number(document.getElementById(id)?.value || 0);
    if (document.getElementById('roiResult')) {
      const cost=get('roiCost'), pipe=get('roiPipeline'), win=get('roiWin')/100, rev=pipe*win, roi=cost?((rev-cost)/cost*100):0;
      document.getElementById('roiResult').textContent = `${Math.round(roi)}%`;
      document.getElementById('roiDetail').textContent = `${money(rev)} expected revenue`;
      const conversations=get('staffConversations'), capacity=Math.max(get('staffCapacity'),1), days=Math.max(get('staffDays'),1), reps=Math.ceil(conversations/(capacity*days));
      document.getElementById('staffResult').textContent = reps;
      document.getElementById('staffDetail').textContent = `${Math.ceil(conversations/days)} conversations per day`;
      const target=get('meetingPipeline'), opp=Math.max(get('meetingOpp'),1), conv=Math.max(get('meetingConversion')/100,.01), opps=Math.ceil(target/opp), meetings=Math.ceil(opps/conv);
      document.getElementById('meetingResult').textContent = meetings;
      document.getElementById('meetingDetail').textContent = `${opps} opportunities required`;
    }
  }

  document.addEventListener('click', ev => {
    const target = ev.target.closest('button,[data-open-event],[data-task-toggle-button]');
    if (!target) return;
    if (target.dataset.nav) { state.view=target.dataset.nav;state.selectedEventId=null;state.search='';saveState();render();window.scrollTo({top:0,behavior:'smooth'});return; }
    if (target.dataset.openEvent) { state.selectedEventId=target.dataset.openEvent;state.eventTab='overview';const e=state.events.find(x=>x.id===state.selectedEventId);state.planPhase=e?.phase||'Strategy';saveState();render();window.scrollTo({top:0,behavior:'smooth'});return; }
    if (target.dataset.eventTab) { state.eventTab=target.dataset.eventTab;saveState();render();return; }
    if (target.dataset.planPhase) { state.planPhase=target.dataset.planPhase;saveState();render();return; }
    if (target.dataset.eventFilter) { state.eventFilter=target.dataset.eventFilter;saveState();render();return; }
    if (target.dataset.taskFilter) { state.taskFilter=target.dataset.taskFilter;saveState();render();return; }
    if (target.dataset.templateFilter) { state.templateFilter=target.dataset.templateFilter;saveState();render();return; }
    if (target.dataset.openTemplate) { openTemplate(target.dataset.openTemplate);return; }
    if (target.dataset.copyTemplate) { copyTemplate(target.dataset.copyTemplate);return; }
    if (target.dataset.taskToggleButton) { toggleTask(target.dataset.taskToggleButton,true);return; }
    if (target.dataset.deleteTask) { const [eid,tid]=target.dataset.deleteTask.split('|');const e=state.events.find(x=>x.id===eid);e.tasks=e.tasks.filter(t=>t.id!==tid);saveState();render();toast('Item removed');return; }
    if (target.dataset.modalClose!==undefined || target.closest('[data-modal-close]')===target) { closeModal();return; }
    switch(target.dataset.action) {
      case 'new-event': showEventModal(false); break;
      case 'edit-event': showEventModal(true); break;
      case 'close-event': state.selectedEventId=null;state.view='events';saveState();render(); break;
      case 'delete-event': if(confirm('Delete this event?')){state.events=state.events.filter(x=>x.id!==state.selectedEventId);state.selectedEventId=null;state.view='events';saveState();render();toast('Event deleted');} break;
      case 'save-notes': {const e=state.events.find(x=>x.id===state.selectedEventId);e.notes=document.getElementById('eventNotes').value;saveState();toast('Notes saved');break;}
      case 'edit-metrics': showMetricsModal();break;
      case 'toggle-theme': state.theme=effectiveTheme()==='dark'?'light':'dark';saveState();render();break;
      case 'export-data': exportData();break;
      case 'reset-data': if(confirm('Reset all demo data?')){state=structuredClone(initialState);saveState();render();toast('Demo reset');}break;
    }
  });

  document.addEventListener('change', ev => {
    if (ev.target.matches('[data-task-toggle]')) toggleTask(ev.target.dataset.taskToggle,ev.target.checked);
    if (ev.target.matches('[data-followup-toggle]')) { const [eid,fid]=ev.target.dataset.followupToggle.split('|');const e=state.events.find(x=>x.id===eid);const f=e.followups.find(x=>x.id===fid);f.done=ev.target.checked;saveState();setTimeout(render,0); }
    if (ev.target.id==='eventTypeFilter') {state.eventFilter=ev.target.value;saveState();render();}
    if (ev.target.id==='ownerFilter') {state.ownerFilter=ev.target.value;saveState();render();}
    if (ev.target.id==='templateFilterSelect') {state.templateFilter=ev.target.value;saveState();render();}
  });
  function toggleTask(key,value) { const [eid,tid]=key.split('|');const e=state.events.find(x=>x.id===eid);const t=e.tasks.find(x=>x.id===tid);if(t){t.done=value===true?true:!!value;saveState();toast(t.done?'Item completed':'Item reopened');setTimeout(render,0);} }

  const search=document.getElementById('globalSearch');
  search.addEventListener('input',()=>{state.search=search.value;saveState();render();});
  document.getElementById('searchClear').addEventListener('click',()=>{state.search='';saveState();render();document.getElementById('globalSearch').focus();});
  document.addEventListener('keydown',ev=>{if(ev.key==='Escape')closeModal();if((ev.metaKey||ev.ctrlKey)&&ev.key.toLowerCase()==='k'){ev.preventDefault();document.getElementById('globalSearch').focus();}});
  document.addEventListener('keydown',ev=>{const el=ev.target.closest('[data-open-event]');if(el&&(ev.key==='Enter'||ev.key===' ')){ev.preventDefault();el.click();}});

  document.getElementById('brandIcon').innerHTML=icon('spark',18);
  document.getElementById('searchIcon').innerHTML=icon('search',17);
  document.getElementById('addIcon').innerHTML=icon('plus',16);
  matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change',()=>{if(state.theme==='system'){applyTheme();render();}});
  render();
})();
</script>
</body>
</html>
